<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <title>POS Terminal</title>
</head>
<body class="bg-slate-950 text-white h-screen flex overflow-hidden">
    <main class="flex-1 p-8 overflow-y-auto">
        <h1 class="text-3xl font-black italic mb-8">LOVELY <span class="text-fuchsia-500">CLUB</span></h1>
        <div id="floor" class="grid grid-cols-4 gap-6"></div>
    </main>

    <aside class="w-96 bg-slate-900 border-l border-slate-800 p-6 flex flex-col">
        <h2 id="table-id" class="text-2xl font-bold text-fuchsia-400 mb-6 uppercase">Select Table</h2>
        <div id="cart" class="flex-1 space-y-2 overflow-y-auto border-b border-slate-800 mb-4"></div>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="add('Vodka Bottle', 350)" class="bg-slate-800 p-3 rounded-lg hover:bg-slate-700">Vodka $350</button>
            <button onclick="add('Champagne', 500)" class="bg-slate-800 p-3 rounded-lg hover:bg-slate-700">Champ $500</button>
        </div>
        <button onclick="send()" class="w-full bg-fuchsia-600 py-4 rounded-xl font-black text-xl hover:scale-95 transition-all">SEND TO BAR</button>
    </aside>

    <script src="app.js"></script>
    <script src="security.js"></script>
    <script>
        let currentTable = null; let cart = [];
        window.onload = () => showPinPad(() => {
            const floor = document.getElementById('floor');
            ['V1','V2','V3','V4','B1','B2','VIP-1','VIP-2'].forEach(id => {
                const t = document.createElement('div');
                t.className = "h-32 bg-slate-800 border-2 border-slate-700 rounded-2xl flex items-center justify-center cursor-pointer hover:border-fuchsia-500 font-bold text-xl";
                t.innerText = id;
                t.onclick = () => { currentTable = id; document.getElementById('table-id').innerText = "Table: " + id; };
                floor.appendChild(t);
            });
        });

        function add(n, p) {
            if(!currentTable) return alert("Pick a table!");
            cart.push({n, p});
            document.getElementById('cart').innerHTML += `<div class="flex justify-between"><span>${n}</span><span>$${p}</span></div>`;
        }

        function send() {
            if(!cart.length) return;
            db.ref('orders').push({ table: currentTable, items: cart.map(i => i.n), status: 'pending', time: Date.now() });
            alert("Order Sent!");
            location.reload();
        }
    </script>
</body>
</html>
