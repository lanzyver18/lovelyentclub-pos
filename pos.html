<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>Club POS | Server Terminal</title>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div class="flex h-screen">
        <nav class="w-20 bg-slate-800 flex flex-col items-center py-6 gap-8 border-r border-slate-700">
            <div class="text-fuchsia-500 text-2xl font-bold">V</div>
            <button class="p-3 bg-fuchsia-600 rounded-xl"><i class="fas fa-plus"></i></button>
            <button class="p-3 hover:bg-slate-700 rounded-xl"><i class="fas fa-table"></i></button>
            <button class="p-3 hover:bg-slate-700 rounded-xl"><i class="fas fa-history"></i></button>
        </nav>

        <main class="flex-1 p-6 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">New Order <span class="text-slate-500 text-lg">#VIP-402</span></h1>
                <div class="flex gap-4">
                    <input type="text" placeholder="Search drinks..." class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 w-64">
                </div>
            </header>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <button onclick="addToCart('Grey Goose 750ml', 350)" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 hover:border-fuchsia-500 transition-all text-left group">
                    <div class="h-32 bg-slate-700 rounded-xl mb-3 flex items-center justify-center group-hover:bg-slate-600">
                        <i class="fas fa-wine-bottle text-3xl text-slate-500"></i>
                    </div>
                    <p class="font-semibold">Grey Goose</p>
                    <p class="text-fuchsia-400">$350.00</p>
                </button>
                </div>
        </main>

        <aside class="w-96 bg-slate-800 border-l border-slate-700 p-6 flex flex-col">
            <h2 class="text-xl font-bold mb-6">Current Order</h2>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4">
                </div>
            <div class="border-t border-slate-700 pt-6 mt-6">
                <div class="flex justify-between mb-2"><span>Subtotal</span><span>$350.00</span></div>
                <div class="flex justify-between mb-4 text-fuchsia-400 font-bold text-xl"><span>Total</span><span>$350.00</span></div>
                <button onclick="sendToKDS()" class="w-full bg-fuchsia-600 hover:bg-fuchsia-700 text-white py-4 rounded-2xl font-bold transition-all shadow-lg shadow-fuchsia-500/20">
                    SEND TO BAR / KDS
                </button>
            </div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database.compat.js"></script>
    <script src="app.js"></script>
    <script>
        function sendToKDS() {
            const orderId = "ORD-" + Date.now();
            db.ref('orders/' + orderId).set({
                table: "VIP 4",
                items: ["Grey Goose 750ml", "Red Bull x4"],
                status: "pending",
                timestamp: Date.now()
            });
            alert("Order sent to Bar!");
        }
    </script>
</body>
</html>
