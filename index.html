<!DOCTYPE html>
<html lang="en">
<head><title>KDS MONITOR</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif;">
    <header style="background:#fff; color:#000; padding:10px;">STATION: KITCHEN</header>
    <div id="kdsGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:10px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com" }));

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('kdsGrid');
        grid.innerHTML = '';
        Object.entries(snap.val() || {}).forEach(([id, order]) => {
            if (order.status === "PENDING") {
                const card = document.createElement('div');
                card.style.border = "2px solid #fff";
                card.style.padding = "10px";
                card.innerHTML = `<h3>${order.siNumber}</h3><p>${order.items.join(', ')}</p><button onclick="bump('${id}', '${order.siNumber}')">DONE</button>`;
                grid.appendChild(card);
            }
        });
    });

    window.bump = (id, si) => {
        update(ref(db, `orders/${id}`), { status: "READY", kitchenDone: true });
        push(ref(db, 'audit_trail'), { action: "BUMP_KITCHEN", si: si, time: serverTimestamp() });
    };
</script>
</body>
</html>
