<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KDS MONITOR - COMPLIANT</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .order-card { border: 4px solid #fff; margin: 10px; padding: 15px; }
        .done-btn { background: #fff; color: #000; padding: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <h1>KITCHEN PREP (STATION: ALL)</h1>
    <div id="grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const app = initializeApp({ databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com" });
    const db = getDatabase(app);

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const data = snap.val();
        if (!data) return;

        Object.entries(data).forEach(([id, order]) => {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `<h3>${order.siNumber} - ${order.table}</h3><p>${order.items.join(', ')}</p>
                             <button class="done-btn" onclick="bump('${id}', '${order.siNumber}')">DONE</button>`;
            grid.appendChild(card);
        });
    });

    window.bump = (id, si) => {
        update(ref(db, `orders/${id}`), { status: "COMPLETED", completedAt: serverTimestamp() });
        push(ref(db, 'audit_trail'), { action: "BUMP_ORDER", siNumber: si, time: serverTimestamp() });
    };
</script>
</body>
</html>
