<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; }
        header { height: 70px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1C1C1E; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .table-no { font-size: 2rem; font-weight: 800; color: #0A84FF; }
        .btn { width: 100%; background: #30D158; border: none; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h2>KITCHEN DISPLAY</h2><div id="clock"></div></header>
    <div id="grid" class="grid"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const cfg = { apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs", authDomain: "lovelyentclub-pos.firebaseapp.com", projectId: "lovelyentclub-pos", databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com" };
    const db = getDatabase(initializeApp(cfg));
    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const data = snap.val(); if (!data) return;
        Object.entries(data).sort((a, b) => a[1].timestamp - b[1].timestamp).forEach(([id, o]) => {
            if (o.status === "PENDING") {
                const c = document.createElement('div'); c.className = 'card';
                c.innerHTML = `<div class="table-no">${o.table}</div><small>${new Date(o.timestamp).toLocaleTimeString()}</small>
                    <div style="font-size:1.2rem; margin-top:15px;">${o.details.map(i => `• ${i.n} <br><small style="color:yellow;">— ${i.mod}</small><br>`).join('')}</div>
                    <button class="btn" onclick="bump('${id}')">MARK READY</button>`;
                grid.appendChild(c);
            }
        });
    });
    window.bump = (id) => update(ref(db, `orders/${id}`), { status: "READY" });
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
</script>
</body>
</html>
