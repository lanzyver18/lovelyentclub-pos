<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KDS MONITOR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { background: #fff; color: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .kds-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; }
        .slot { border: 4px solid #fff; padding: 15px; display: flex; flex-direction: column; }
        .urgent { border-color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { border-color: #000; } }
        .slot-head { font-size: 1.5rem; font-weight: 900; border-bottom: 2px solid #fff; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .btn-bump { background: #fff; color: #000; border: none; padding: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight:900;">KITCHEN STATION</div>
        <div id="kdsClock">00:00</div>
    </header>
    <div id="kdsGrid" class="kds-grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, serverTimestamp, set, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
    
    const db = getDatabase(initializeApp({ databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com" }));
    let knownIds = new Set();

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('kdsGrid'); grid.innerHTML = '';
        const data = snap.val(); if(!data) return;
        
        Object.entries(data).forEach(([id, order]) => {
            if(order.status === "PENDING") {
                if(!knownIds.has(id)) { new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); knownIds.add(id); }
                const elapsed = Math.floor((Date.now() - order.timestamp) / 1000);
                const slot = document.createElement('div');
                slot.className = `slot ${elapsed > 180 ? 'urgent' : ''}`;
                slot.innerHTML = `
                    <div class="slot-head"><span>${order.table}</span><span>${Math.floor(elapsed/60)}m</span></div>
                    <div style="font-size:1.4rem; flex-grow:1;">${order.details.map(i => `• ${i.qty}x ${i.name}`).join('<br>')}</div>
                    <button class="btn-bump" onclick="bump('${id}', '${order.siNumber}')">DONE</button>`;
                grid.appendChild(slot);
            }
        });
    });

    window.bump = (id, si) => {
        update(ref(db, `orders/${id}`), { status: "READY" });
        push(ref(db, 'audit_trail'), { action: "KDS_BUMP", si, time: serverTimestamp() });
    };
    setInterval(() => { document.getElementById('kdsClock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
