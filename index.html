<!DOCTYPE html>
<html>
<head><title>KDS | KITCHEN</title><style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
    .card { border: 2px solid #fff; padding: 20px; border-radius: 10px; background: #111; }
    .btn { background: #34c759; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 15px; cursor: pointer; border-radius: 5px; }
</style></head>
<body>
    <div style="padding:20px; background:#fff; color:#000; font-weight:bold;">KITCHEN ORDERS</div>
    <div id="kdsGrid" class="grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs",
        authDomain: "lovelyentclub-pos.firebaseapp.com",
        projectId: "lovelyentclub-pos",
        databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(config); const db = getDatabase(app); 
    signInAnonymously(getAuth(app));

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('kdsGrid'); grid.innerHTML = '';
        const data = snap.val(); if (!data) return;
        Object.entries(data).forEach(([id, o]) => {
            if (o.status === "PENDING") {
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<h2>${o.table}</h2><p>${o.details.map(i => `• ${i.qty}x ${i.name}`).join('<br>')}</p>
                                  <button class="btn" onclick="bump('${id}')">MARK DONE</button>`;
                grid.appendChild(card);
            }
        });
    });
    window.bump = (id) => update(ref(db, `orders/${id}`), { status: "READY" });
</script>
</body>
</html>
