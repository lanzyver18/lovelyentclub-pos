<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KDS MONITOR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .header { background: #fff; color: #000; padding: 15px; font-weight: 900; font-size: 1.5rem; }
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .order-card { border: 4px solid #fff; padding: 20px; }
        .item { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        .btn-done { width: 100%; background: #fff; color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">KITCHEN DISPLAY SYSTEM</div>
    <div id="kdsGrid" class="kds-grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com" }));

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('kdsGrid');
        grid.innerHTML = '';
        Object.entries(snap.val() || {}).forEach(([id, order]) => {
            if (order.status === "PENDING") {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `<h2>${order.siNumber}</h2>${order.items.map(i => `<div class="item">• ${i}</div>`).join('')}
                                 <button class="btn-done" onclick="bump('${id}', '${order.siNumber}')">MARK DONE</button>`;
                grid.appendChild(card);
            }
        });
    });

    window.bump = (id, si) => {
        update(ref(db, `orders/${id}`), { status: "READY", kitchenTime: serverTimestamp() });
        push(ref(db, 'audit_trail'), { action: "KITCHEN_DONE", si: si, time: serverTimestamp() });
    };
</script>
</body>
</html>
