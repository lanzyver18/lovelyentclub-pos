<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KITCHEN MONITOR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        header { background: #fff; color: #000; padding: 15px; font-weight: 900; font-size: 1.5rem; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 4px solid #fff; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; height: 300px; }
        .card.urgent { border-color: red; }
        .btn-bump { background: #34c759; color: #fff; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>
    <header><div>KITCHEN STATION</div><div id="kdsTime">00:00</div></header>
    <div class="grid" id="kdsGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs",
        authDomain: "lovelyentclub-pos.firebaseapp.com",
        projectId: "lovelyentclub-pos",
        databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('kdsGrid');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) return;

        Object.entries(data).forEach(([id, order]) => {
            if(order.status === "PENDING") {
                const elapsed = Math.floor((Date.now() - order.timestamp) / 60000);
                const card = document.createElement('div');
                card.className = `card ${elapsed > 5 ? 'urgent' : ''}`;
                card.innerHTML = `<div style="font-size:1.8rem; font-weight:900;">${order.table} <span style="float:right; font-size:1rem;">${elapsed}m</span></div>
                                 <div style="flex-grow:1; font-size:1.4rem; margin-top:15px;">${order.details.map(i => `• ${i.qty}x ${i.name}`).join('<br>')}</div>
                                 <button class="btn-bump" onclick="bump('${id}')">MARK DONE</button>`;
                grid.appendChild(card);
            }
        });
    });

    window.bump = (id) => { update(ref(db, `orders/${id}`), { status: "READY" }); };
    setInterval(() => { document.getElementById('kdsTime').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
