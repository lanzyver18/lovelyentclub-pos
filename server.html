<!DOCTYPE html>
<html>
<head><title>SERVER PICKUP</title><style>
    body { font-family: sans-serif; background: #f2f2f7; padding: 20px; }
    .card { background: #fff; padding: 20px; margin-bottom: 10px; border-radius: 10px; border-left: 10px solid #5856d6; }
    .btn { background: #000; color: #fff; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; float: right; }
</style></head>
<body>
    <h1>Ready for Delivery</h1>
    <div id="deliveryGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"; // Standardizing
    import { getDatabase, ref, onValue, remove, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs",
        authDomain: "lovelyentclub-pos.firebaseapp.com",
        projectId: "lovelyentclub-pos",
        databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(config); const db = getDatabase(app);

    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('deliveryGrid'); grid.innerHTML = '';
        const data = snap.val(); if (!data) return;
        Object.entries(data).forEach(([id, o]) => {
            if (o.status === "READY") {
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<button class="btn" onclick="delivered('${id}')">DELIVERED</button>
                                  <b>${o.table}</b><br><small>${o.siNumber}</small>`;
                grid.appendChild(card);
            }
        });
    });

    window.delivered = (id) => {
        onValue(ref(db, `orders/${id}`), (snap) => {
            const data = snap.val();
            if (data) {
                push(ref(db, 'history'), { ...data, deliveredAt: serverTimestamp() }).then(() => {
                    remove(ref(db, `orders/${id}`));
                });
            }
        }, { onlyOnce: true });
    };
</script>
</body>
</html>
