<!DOCTYPE html>
<html lang="en">
<body>
    <h1>READY FOR PICKUP</h1>
    <div id="readyList"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
    
    const db = getDatabase(initializeApp({ databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com" }));

    onValue(ref(db, 'orders'), (snap) => {
        const list = document.getElementById('readyList');
        list.innerHTML = '';
        Object.entries(snap.val() || {}).forEach(([id, order]) => {
            if (order.status === "READY") {
                list.innerHTML += `<div style="padding:20px; border:1px solid #000; margin:5px;">
                                   <strong>${order.siNumber}</strong> <button onclick="deliver('${id}')">DELIVERED</button>
                                   </div>`;
            }
        });
    });

    window.deliver = (id) => {
        onValue(ref(db, `orders/${id}`), (snap) => {
            const data = snap.val();
            // Move to history for permanent 10-year storage
            push(ref(db, 'history'), { ...data, deliveredAt: serverTimestamp(), status: "CLOSED" });
            remove(ref(db, `orders/${id}`));
        }, { onlyOnce: true });
    };
</script>
</body>
</html>
