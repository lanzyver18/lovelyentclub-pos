<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>SERVER | DELIVERY</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; }
        header { background: #000; color: #fff; padding: 20px; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #fff; border-radius: 16px; padding: 20px; border-left: 8px solid #5856d6; }
        .btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
<header><h2>READY FOR DELIVERY</h2><div id="clock"></div></header>
<div class="grid" id="list"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const cfg = { apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs", authDomain: "lovelyentclub-pos.firebaseapp.com", projectId: "lovelyentclub-pos", databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com" };
    const app = initializeApp(cfg); const db = getDatabase(app); signInAnonymously(getAuth(app));
    onValue(ref(db, 'orders'), (snap) => {
        const grid = document.getElementById('list'); grid.innerHTML = '';
        const data = snap.val(); if (!data) return;
        Object.entries(data).forEach(([id, o]) => {
            if (o.status === "READY") {
                const c = document.createElement('div'); c.className = 'card';
                c.innerHTML = `<h2>${o.table}</h2><p>${o.details.map(i => i.n).join(', ')}</p><button class="btn" onclick="deliver('${id}')">DELIVERED</button>`;
                grid.appendChild(c);
            }
        });
    });
    window.deliver = (id) => {
        onValue(ref(db, `orders/${id}`), (s) => {
            const data = s.val(); if(!data) return;
            push(ref(db, 'history'), { ...data, status: "CLOSED", deliveredAt: serverTimestamp() }).then(() => remove(ref(db, `orders/${id}`)));
        }, { onlyOnce: true });
    };
</script>
</body>
</html>
