<!DOCTYPE html>
<html>
<head><title>REPORTS | MANAGER</title>
<style>
    body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 20px; margin: 0; }
    #login { position: fixed; inset: 0; background: #1c1c1e; color: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
    th { text-align: left; padding: 15px; background: #000; color: #fff; }
    td { padding: 15px; border-bottom: 1px solid #eee; }
    .btn-void { background: #ff3b30; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    @media print { .no-print { display: none; } body { background: white; } .card { box-shadow: none; border: 1px solid #eee; } }
</style>
</head>
<body>
    <div id="login" class="no-print">
        <div style="text-align:center; background:#fff; color:#000; padding:40px; border-radius:20px;">
            <h2 style="margin-top:0">MANAGER ACCESS</h2>
            <input type="email" id="email" placeholder="Email" style="padding:10px; width:200px;"><br><br>
            <input type="password" id="pass" placeholder="Password" style="padding:10px; width:200px;"><br><br>
            <button onclick="login()" style="padding:10px 40px; background:#000; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">UNLOCK</button>
        </div>
    </div>

    <div id="content" style="display:none">
        <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Lovely ENT | Sales Report</h1>
            <button onclick="window.print()" style="padding:10px 20px; cursor:pointer; font-weight:bold;">PRINT TO PDF / THERMAL</button>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card">
                <h1 id="gross" style="margin:0; font-size:2.5rem; color:#007aff;">₱0</h1>
                <small>NON-RESETTABLE GRAND TOTAL</small>
            </div>
            <div class="card">
                <h1 id="txn" style="margin:0; font-size:2.5rem;">0</h1>
                <small>TOTAL SUCCESSFUL SALES</small>
            </div>
        </div>

        <h3>TRANSACTION HISTORY</h3>
        <table>
            <thead><tr><th>SI #</th><th>TABLE</th><th>TOTAL</th><th class="no-print">ACTION</th></tr></thead>
            <tbody id="hist"></tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, remove, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs", authDomain: "lovelyentclub-pos.firebaseapp.com", projectId: "lovelyentclub-pos", databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com" };
    const app = initializeApp(config); const db = getDatabase(app); const auth = getAuth(app);

    window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e=>alert("Access Denied"));

    onAuthStateChanged(auth, (u) => {
        if(u && !u.isAnonymous) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            loadData();
        }
    });

    function loadData() {
        onValue(ref(db, 'system_controls'), s => {
            if(s.val()) document.getElementById('gross').innerText = "₱" + s.val().accumulatedGrandTotal.toLocaleString();
        });
        onValue(ref(db, 'history'), s => {
            const h = document.getElementById('hist'); h.innerHTML = '';
            if(!s.val()) return;
            const entries = Object.entries(s.val());
            document.getElementById('txn').innerText = entries.length;
            entries.reverse().forEach(([id, o]) => {
                h.innerHTML += `<tr>
                    <td><b>${o.siNumber}</b></td>
                    <td>${o.table}</td>
                    <td>₱${o.totalValue.toLocaleString()}</td>
                    <td class="no-print"><button class="btn-void" onclick="v('${id}','${o.siNumber}')">VOID</button></td>
                </tr>`;
            });
        });
    }

    window.v = (id, si) => {
        const reason = prompt("Enter reason for VOID:");
        if(!reason) return;
        if(confirm("Confirm VOID for SI: " + si + "?")) {
            onValue(ref(db,`history/${id}`), s => {
                push(ref(db,'voided_history'), {
                    ...s.val(), 
                    voidedAt: serverTimestamp(), 
                    reason: reason,
                    authorizedBy: auth.currentUser.email
                }).then(() => {
                    remove(ref(db, `history/${id}`));
                    alert("Order Voided and Logged in Audit Trail.");
                });
            }, {onlyOnce:true});
        }
    }
</script>
</body>
</html>
