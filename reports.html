<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MANAGER REPORTS</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f8f9fa; }
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #ddd; text-align: center; }
        .val { font-size: 2.5rem; font-weight: 900; display: block; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th { background: #000; color: #fff; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn-z { background: red; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <h1>DAILY SALES & COMPLIANCE</h1>
    <div class="metrics">
        <div class="card"><span class="val" id="gross">₱0</span>GROSS REVENUE</div>
        <div class="card"><span class="val" id="vat">₱0</span>12% VAT COLLECTED</div>
        <div class="card"><button class="btn-z" onclick="doZ()">GENERATE Z-READING</button></div>
    </div>
    <table>
        <thead><tr><th>SI #</th><th>Table</th><th>Total</th><th>Time</th></tr></thead>
        <tbody id="histBody"></tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs",
        authDomain: "lovelyentclub-pos.firebaseapp.com",
        projectId: "lovelyentclub-pos",
        databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'history'), (snap) => {
        let gross = 0;
        const body = document.getElementById('histBody');
        body.innerHTML = '';
        const data = snap.val();
        if(!data) return;

        Object.values(data).forEach(o => {
            let total = 0;
            if(o.details) o.details.forEach(d => { total += (d.qty * 100); }); // Simple calc for display
            gross += total;
            body.innerHTML += `<tr><td>${o.siNumber}</td><td>${o.table}</td><td>₱${total}</td><td>${new Date(o.deliveredAt).toLocaleTimeString()}</td></tr>`;
        });

        document.getElementById('gross').innerText = "₱" + gross.toLocaleString();
        document.getElementById('vat').innerText = "₱" + (gross * 0.12).toLocaleString();
    });

    window.doZ = () => {
        if(confirm("Generate Z-Reading? This closes the current sales period.")) {
            push(ref(db, 'z_reports'), { timestamp: serverTimestamp(), total: document.getElementById('gross').innerText });
            alert("Z-Reading Logged Successfully.");
        }
    };
</script>
</body>
</html>
