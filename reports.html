<!DOCTYPE html>
<html lang="en">
<body>
    <h1>BIR COMPLIANCE CENTER</h1>
    <button onclick="zReading()">GENERATE Z-READING</button>
    <button onclick="exportEIS()">EXPORT FOR BIR (EIS 2026)</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
    
    const db = getDatabase(initializeApp({ databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com" }));

    window.zReading = () => {
        if (!confirm("This will close the current financial period. Continue?")) return;
        push(ref(db, 'z_reports'), { timestamp: serverTimestamp(), action: "Z_READING" });
        alert("Z-Reading logged. Data archived according to 10-year rule.");
    };

    window.exportEIS = () => {
        onValue(ref(db, 'history'), (snap) => {
            const blob = new Blob([JSON.stringify(snap.val(), null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `BIR_EIS_2026_EXPORT.json`;
            a.click();
        }, { onlyOnce: true });
    };
</script>
</body>
</html>
