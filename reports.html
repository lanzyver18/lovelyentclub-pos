<!DOCTYPE html>
<html>
<head>
    <title>REPORTS | MANAGER LOGIN</title>
    <style>
        :root { --accent: #007aff; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 60px; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1c1c1e; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-login { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Dashboard UI */
        .content { padding: 30px; display: none; } /* Hidden until login */
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .val { font-size: 2rem; font-weight: 900; color: var(--accent); }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
        th { background: #000; color: #fff; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        #status-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; text-align: center; font-weight: bold; }
        .online { background: #34c759; color: #fff; }
        .offline { background: #ff3b30; color: #fff; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-top:0;">MANAGER LOGIN</h2>
            <p style="color:#666; font-size:0.9rem;">Access restricted to Lovely ENT Management only.</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-login" onclick="managerLogin()">UNLOCK SYSTEM</button>
            <p id="error-msg" style="color:red; font-size:0.8rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div class="content" id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>REPORTS & ANALYTICS</h1>
            <button onclick="logout()" style="padding:8px 15px; border-radius:5px; border:1px solid #ccc; cursor:pointer;">Logout</button>
        </div>
        
        <div class="metrics">
            <div class="card"><span id="gross" class="val">₱0</span><br>GRAND TOTAL</div>
            <div class="card"><span id="count" class="val">0</span><br>CLOSED SALES</div>
        </div>

        <table>
            <thead><tr><th>SI #</th><th>TABLE</th><th>TIME</th></tr></thead>
            <tbody id="histBody"></tbody>
        </table>
    </div>

    <div id="status-bar" class="offline">CONNECTING TO DATABASE...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBY1ctdRkTUktpt-uYhRqFxF37jkylxsGs",
        authDomain: "lovelyentclub-pos.firebaseapp.com",
        projectId: "lovelyentclub-pos",
        databaseURL: "https://lovelyentclub-pos-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // LOGIN FUNCTION
    window.managerLogin = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('error-msg');
        
        signInWithEmailAndPassword(auth, email, pass)
            .catch(error => {
                err.style.display = "block";
                err.innerText = "Invalid credentials. Access denied.";
            });
    };

    // LOGOUT FUNCTION
    window.logout = () => { signOut(auth).then(() => location.reload()); };

    // AUTH OBSERVER: Show/Hide UI based on login state
    onAuthStateChanged(auth, (user) => {
        const overlay = document.getElementById('login-overlay');
        const dashboard = document.getElementById('dashboard');
        
        if (user && !user.isAnonymous) { // Only allow Email/Password users
            overlay.style.display = "none";
            dashboard.style.display = "block";
            initDataListeners();
        } else {
            overlay.style.display = "flex";
            dashboard.style.display = "none";
        }
    });

    // DATA LISTENERS
    function initDataListeners() {
        // Status Bar
        onValue(ref(db, '.info/connected'), (snap) => {
            const bar = document.getElementById('status-bar');
            bar.innerText = snap.val() ? "SECURE CONNECTION ACTIVE" : "OFFLINE";
            bar.className = snap.val() ? "online" : "offline";
        });

        // Revenue Total
        onValue(ref(db, 'system_controls'), (snap) => {
            const d = snap.val();
            if (d) document.getElementById('gross').innerText = "₱" + (d.accumulatedGrandTotal || 0).toLocaleString();
        });

        // Sales Table
        onValue(ref(db, 'history'), (snap) => {
            const body = document.getElementById('histBody');
            body.innerHTML = '';
            const data = snap.val();
            if (!data) return;
            const items = Object.values(data);
            document.getElementById('count').innerText = items.length;
            items.reverse().forEach(o => {
                body.innerHTML += `<tr><td>${o.siNumber}</td><td>${o.table}</td><td>${new Date(o.deliveredAt).toLocaleTimeString()}</td></tr>`;
            });
        });
    }
</script>
</body>
</html>
