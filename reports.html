<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REPORTS - MANAGER ACCESS ONLY</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border: 2px solid #000; text-align: center; }
        .stat-value { font-size: 2.2rem; font-weight: 900; display: block; }
        /* Manager Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
                        color: #fff; z-index: 1000; display: flex; flex-direction: column; 
                        align-items: center; justify-content: center; }
        .login-box { background: #fff; color: #000; padding: 30px; border-radius: 8px; text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 200px; display: block; border: 2px solid #000; }
        .btn-black { background: #000; color: #fff; padding: 10px 20px; border: none; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2>MANAGER LOGIN</h2>
            <input type="email" id="mgrEmail" placeholder="Manager Email">
            <input type="password" id="mgrPass" placeholder="Password">
            <button class="btn-black" onclick="managerSignIn()">UNLOCK REPORTS</button>
        </div>
    </div>

    <div class="container">
        <header><h1>FINANCIAL ANALYTICS</h1></header>
        <div class="stats-row">
            <div class="stat-card"><span class="stat-value" id="grossRevenue">₱0</span>GROSS REVENUE</div>
            <div class="stat-card"><span class="stat-value" id="totalOrders">0</span>TOTAL ORDERS</div>
            <div class="stat-card">
                <button class="btn-black" onclick="generateZReading()">GENERATE Z-READING</button>
            </div>
        </div>
        <table id="historyTable" style="width:100%; border-collapse:collapse; background:white; border:2px solid #000;">
            <thead style="background:#000; color:#fff;">
                <tr><th>SI #</th><th>Table</th><th>Value</th><th>VAT (12%)</th><th>Time</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getDatabase, ref, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyB1BND4Pd7vpd_8LJW1IwZB36-4uFdO6R4", authDomain: "pos-lovelyentclub.firebaseapp.com", databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com", projectId: "pos-lovelyentclub" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Guard the UI until authenticated
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            loadData();
        }
    });

    window.managerSignIn = () => {
        const email = document.getElementById('mgrEmail').value;
        const pass = document.getElementById('mgrPass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Access Denied: " + err.message));
    };

    function loadData() {
        onValue(ref(db, 'history'), (snap) => {
            const data = snap.val();
            const body = document.getElementById('historyBody');
            body.innerHTML = '';
            let gross = 0;
            if (!data) return;

            Object.values(data).forEach(o => {
                gross += o.totalValue;
                body.innerHTML += `<tr>
                    <td>${o.siNumber}</td><td>${o.table}</td>
                    <td>₱${o.totalValue.toLocaleString()}</td><td>₱${o.vatAmount.toFixed(2)}</td>
                    <td>${new Date(o.timestamp).toLocaleTimeString()}</td>
                </tr>`;
            });
            document.getElementById('grossRevenue').innerText = "₱" + gross.toLocaleString();
            document.getElementById('totalOrders').innerText = Object.keys(data).length;
        });
    }

    window.generateZReading = () => {
        if (confirm("Generate Z-Reading? This closes the financial period.")) {
            push(ref(db, 'z_reports'), { timestamp: serverTimestamp(), type: "Z-READING", manager: auth.currentUser.email });
            push(ref(db, 'audit_trail'), { action: "Z_READING_GEN", user: auth.currentUser.email, time: serverTimestamp() });
            alert("Z-Reading Generated and Logged.");
        }
    };
</script>
</body>
</html>
