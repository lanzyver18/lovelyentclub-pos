<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAITER TERMINAL - BIR COMPLIANT</title>
    <style>
        :root { --bir-black: #000; --bir-red: #d32f2f; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #fff; }
        .legal-header { background: var(--bir-black); color: #fff; padding: 12px; text-align: center; font-size: 11px; margin-bottom: 10px; line-height: 1.4; }
        .receipt-warning { color: var(--bir-red); border: 2px solid var(--bir-red); padding: 8px; text-align: center; font-weight: 800; font-size: 12px; margin-bottom: 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 20px; border: 2px solid #000; font-weight: bold; background: #fff; cursor: pointer; }
        .btn-send { background: #000; color: #fff; grid-column: span 2; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="legal-header">
        <strong>LOVELY ENT CLUB</strong><br>
        TIN: 123-456-789-000 | VAT REGISTERED<br>
        SYSTEM ID: LOVELY-KDM-2026 | PTU: PENDING
    </div>

    <div class="receipt-warning">*** THIS IS NOT AN OFFICIAL RECEIPT ***</div>

    <div class="menu-grid">
        <button class="btn" onclick="addItem('Burger', 280)">Burger (₱280)</button>
        <button class="btn" onclick="addItem('Beer', 120)">Beer (₱120)</button>
        <button class="btn btn-send" onclick="submitOrder()">SUBMIT TO KITCHEN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, runTransaction, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB1BND4Pd7vpd_8LJW1IwZB36-4uFdO6R4", authDomain: "pos-lovelyentclub.firebaseapp.com", databaseURL: "https://pos-lovelyentclub-default-rtdb.firebaseio.com", projectId: "pos-lovelyentclub" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];
        window.addItem = (name, price) => { cart.push({ name, price }); alert(name + " added"); };

        window.submitOrder = async () => {
            if (cart.length === 0) return alert("Cart empty");
            const systemRef = ref(db, 'system_controls');

            // MANDATORY: Atomic Transaction for Sequence and Total
            await runTransaction(systemRef, (current) => {
                const orderTotal = cart.reduce((sum, item) => sum + item.price, 0);
                if (!current) return { lastSI: 1, accumulatedGrandTotal: orderTotal };
                return {
                    lastSI: (current.lastSI || 0) + 1,
                    accumulatedGrandTotal: (current.accumulatedGrandTotal || 0) + orderTotal
                };
            }).then((result) => {
                const meta = result.snapshot.val();
                const siNumber = `SI-${String(meta.lastSI).padStart(6, '0')}`;
                
                const finalOrder = {
                    siNumber,
                    items: cart.map(i => i.name),
                    totalValue: cart.reduce((sum, item) => sum + item.price, 0),
                    vatAmount: cart.reduce((sum, item) => sum + item.price, 0) * 0.12, // PH VAT
                    timestamp: serverTimestamp(),
                    status: "PENDING",
                    nonResettableTotal: meta.accumulatedGrandTotal
                };

                push(ref(db, 'orders'), finalOrder);
                push(ref(db, 'audit_trail'), { action: "ORDER_CREATED", si: siNumber, time: serverTimestamp() });
                cart = [];
                alert("Order " + siNumber + " Sent!");
            });
        };
    </script>
</body>
</html>
