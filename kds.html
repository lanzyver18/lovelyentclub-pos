<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
</head>
<body class="bg-black text-white p-8">
    <h1 class="text-4xl font-black text-emerald-500 mb-10 italic">BAR ORDERS</h1>
    <div id="orders" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
    <script src="app.js"></script>
    <script>
        db.ref('orders').on('value', snap => {
            const div = document.getElementById('orders'); div.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                if(data[id].status === 'pending') {
                    div.innerHTML += `
                        <div class="bg-slate-900 border-l-8 border-emerald-500 p-6 rounded-r-xl">
                            <h2 class="text-3xl font-bold mb-4">${data[id].table}</h2>
                            <ul class="mb-6">${data[id].items.map(i => `<li>• ${i}</li>`).join('')}</ul>
                            <button onclick="done('${id}')" class="w-full bg-emerald-600 py-3 rounded font-bold">SERVED</button>
                        </div>
                    `;
                }
            }
        });
        function done(id) { db.ref('orders/'+id).update({status:'done'}); }
    </script>
</body>
</html>
